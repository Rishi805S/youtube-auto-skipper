<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SponsorSkip</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <div class="logo">
        <div class="logo-icon">SS</div>
        <h1>SponsorSkip</h1>
      </div>
    </div>

    <div class="status-card">
      <div class="status-indicator">
        <div class="status-dot active"></div>
        <span class="status-text" id="statusText">Active</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="masterToggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="totalSkips">0</div>
        <div class="stat-label">Skipped</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="timeSaved">0m</div>
        <div class="stat-label">Saved</div>
      </div>
    </div>

    <div class="sponsor-section">
      <div class="section-title">Sponsor Segments</div>
      <div class="sponsor-actions">
        <button class="action-btn skip active" data-action="skip">Skip</button>
        <button class="action-btn mute" data-action="mute">Mute</button>
        <button class="action-btn ignore" data-action="ignore">Watch</button>
      </div>
    </div>

    <div class="footer">
      <div class="version">v1.0</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
